<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工时与 AI 绩效 - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/global.css">
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-orange-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="bg-glow-orange"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-orange-600 flex items-center justify-center shadow-[0_0_15px_rgba(249,115,22,0.3)] shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">戴维斯需求大厅</h1>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-2">
            <button onclick="window.location.href='assistant-workspace.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <span class="font-medium text-[14px]">执行看板 (Kanban)</span>
            </button>
            <button onclick="window.location.href='assistant-assets.html'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl text-zinc-400 hover:bg-white/5 hover:text-white transition-all btn-press">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <span class="font-medium text-[14px]">我的过稿资产库</span>
            </button>
            <button class="w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl bg-orange-500/10 text-orange-400 border border-orange-500/20 transition-all btn-press cursor-default">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span class="font-bold text-[14px]">工时与 AI 绩效</span>
            </button>
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between relative z-[9999]">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p id="sidebar-role" class="text-[10px] text-zinc-500 truncate">读取中</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.openPwdModal()" class="p-1.5 text-zinc-500 hover:text-orange-400 hover:bg-orange-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="修改登录密码">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                </button>
                <button onclick="window.logout(event)" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press cursor-pointer pointer-events-auto relative z-50" title="退出登录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative z-10 bg-[#0c0c0e]">
        <header class="h-[88px] px-10 flex justify-between items-center shrink-0 border-b border-white/5 bg-[#09090b]/80 backdrop-blur-xl z-20">
            <div>
                <h2 class="text-2xl font-bold text-white tracking-tight mb-1.5 flex items-center gap-2">
                    排期与效能日历
                    <div id="sync-indicator" class="hidden w-2 h-2 rounded-full bg-emerald-500 animate-pulse ml-2" title="云端连接中..."></div>
                </h2>
                <p class="text-xs text-zinc-500">以数据量化您的设计价值，全景展示工时投入与 AI 提效成果。</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex bg-[#121217] border border-white/10 rounded-xl p-1 shadow-inner">
                    <button id="btn-view-week" onclick="window.switchView('week')" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">周</button>
                    <button id="btn-view-month" onclick="window.switchView('month')" class="px-5 py-1.5 text-[13px] font-bold bg-orange-500/20 text-orange-400 border border-orange-500/20 rounded-lg shadow-sm cursor-default">月</button>
                    <button id="btn-view-year" onclick="window.switchView('year')" class="px-5 py-1.5 text-[13px] font-medium text-zinc-400 hover:text-white transition-colors rounded-lg btn-press">年</button>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="window.navDate(-1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    
                    <div class="relative" id="date-selector-wrapper">
                        <button onclick="window.toggleDropdown('date-dropdown')" class="px-6 py-2 h-full bg-[#121217] border border-white/5 rounded-xl text-[15px] font-bold text-white hover:bg-white/5 transition-colors btn-press min-w-[160px]">
                            <span id="current-date-text">计算中...</span>
                        </button>
                        <div id="date-dropdown" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-2 w-56 bg-[#1a1a24] border border-white/10 rounded-2xl shadow-2xl py-2 z-50 dropdown-enter max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                    </div>

                    <button onclick="window.navDate(1)" class="px-3 py-2 bg-[#121217] border border-white/5 rounded-xl hover:bg-white/10 text-zinc-400 hover:text-white transition-colors btn-press">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <button onclick="window.jumpToCurrent()" class="px-5 py-2 bg-orange-600/20 text-orange-400 font-bold border border-orange-500/20 rounded-xl hover:bg-orange-500/30 transition-colors btn-press text-[13px]" id="btn-jump-current">回到本月</button>

                <div class="w-px h-8 bg-white/10 mx-1"></div>

                <div class="relative" id="notif-wrapper">
                    <button id="notifBtn" class="w-10 h-10 rounded-xl bg-[#141417] border border-white/5 flex items-center justify-center text-zinc-400 hover:text-white transition-colors btn-press relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span id="bell-dot" class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#141417] animate-pulse hidden"></span>
                    </button>
                    <div id="notifMenu" class="hidden absolute right-0 top-[120%] w-[340px] bg-[#121217] border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.8)] py-3 dropdown-enter z-[9999]">
                        <div class="px-5 pb-3 border-b border-white/5 flex justify-between items-center">
                            <h3 class="text-[14px] font-bold text-white">消息通知</h3>
                            <button onclick="window.markAllAsRead(event)" class="text-[11px] text-orange-400 hover:text-orange-300 btn-press transition-colors">全部已读</button>
                        </div>
                        <div class="max-h-[300px] overflow-y-auto custom-scrollbar" id="notif-list-container">
                            <div class="px-5 py-8 text-center text-zinc-500 text-xs">暂无新消息</div>
                        </div>
                        <div class="pt-3 px-5 border-t border-white/5 text-center">
                            <button onclick="window.location.href='message-center.html?role=design'" class="text-[11px] text-zinc-500 hover:text-white transition-colors btn-press">查看全部历史消息 ↗</button>
                        </div>
                    </div>
                </div>

                <div class="relative" id="identity-wrapper">
                    <button id="identityBtn" class="bg-[#141417] border border-white/10 text-zinc-300 px-4 py-2.5 rounded-xl flex items-center gap-2.5 text-[12px] font-medium hover:bg-white/5 transition-colors btn-press">
                        加载中...
                    </button>
                    <div id="identityMenu" class="hidden absolute right-0 top-[120%] w-[240px] bg-[#1a1a1f] border border-white/10 rounded-2xl shadow-2xl py-2 dropdown-enter z-[9999]">
                        <div class="px-2 space-y-1" id="dynamic-identity-list"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 p-8 md:p-10 overflow-y-hidden flex justify-center z-10 relative">
            <div id="calendar-loading" class="absolute inset-0 bg-[#0c0c0e]/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center">
                <svg class="animate-spin h-8 w-8 text-orange-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">SYNCING DATA...</p>
            </div>

            <div class="w-full max-w-[1400px] flex gap-8 items-start h-full pb-4">
                
                <div class="flex-1 bg-[#121217] border border-white/5 rounded-3xl overflow-hidden shadow-2xl flex flex-col h-full min-w-0" id="main-grid-wrapper">
                    
                    <div id="view-month" class="view-section active flex-col h-full">
                        <div class="grid grid-cols-7 border-b border-white/5 bg-[#16161d] shrink-0">
                            <div class="py-4 text-center text-[12px] font-bold text-zinc-500">周日</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周一</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周二</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周三</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周四</div><div class="py-4 text-center text-[12px] font-bold text-zinc-500">周五</div><div class="py-4 text-center text-[12px] font-bold text-orange-400/50">周六</div>
                        </div>
                        <div id="month-grid" class="flex-1 grid grid-cols-7 auto-rows-fr bg-[#121217]"></div>
                    </div>

                    <div id="view-week" class="view-section flex-col h-full bg-transparent border-none shadow-none">
                        <div id="week-grid" class="flex-1 grid grid-cols-7 gap-3 rounded-3xl overflow-hidden"></div>
                    </div>

                    <div id="view-year" class="view-section flex-col h-full bg-transparent border-none shadow-none p-2 overflow-y-auto custom-scrollbar">
                        <div id="year-grid" class="grid grid-cols-4 gap-4"></div>
                    </div>

                </div>

                <div class="w-[340px] bg-[#121217] border border-white/5 rounded-3xl p-7 flex flex-col h-full shadow-2xl shrink-0 overflow-y-auto custom-scrollbar">
                    <h3 class="text-[15px] font-bold text-white mb-6 flex items-center gap-2 pb-4 border-b border-white/5">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                        效能与质量洞察
                    </h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl flex flex-col justify-center relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-orange-500 group-hover:w-2 transition-all"></div>
                            <p class="text-[11px] text-zinc-500 mb-1 font-medium" id="stat-period-title">本期填报工时</p>
                            <p class="text-[28px] font-black text-white font-mono leading-none tracking-tight"><span id="stat-total-hours">0.0</span><span class="text-xs text-zinc-600 ml-1 font-sans font-normal">h</span></p>
                        </div>
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl flex flex-col justify-center relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-emerald-500 group-hover:w-2 transition-all"></div>
                            <p class="text-[11px] text-zinc-500 mb-1 font-medium">按时交付率</p>
                            <p class="text-[28px] font-black text-emerald-400 font-mono leading-none tracking-tight" id="stat-ontime-rate">--</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl flex flex-col justify-center relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-indigo-500 group-hover:w-2 transition-all"></div>
                            <p class="text-[11px] text-zinc-500 mb-1 font-medium">一稿通过率</p>
                            <p class="text-[24px] font-black text-indigo-400 font-mono leading-none tracking-tight" id="stat-first-pass">--</p>
                        </div>
                        <div class="bg-[#09090b] border border-white/5 p-4 rounded-2xl flex flex-col justify-center relative overflow-hidden group">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-fuchsia-500 group-hover:w-2 transition-all"></div>
                            <p class="text-[11px] text-zinc-500 mb-1 font-medium">AI 辅助提效</p>
                            <p class="text-[24px] font-black text-fuchsia-400 font-mono leading-none tracking-tight">+<span id="stat-ai-saved">0</span><span class="text-xs text-fuchsia-500/50 ml-1 font-sans font-normal">h</span></p>
                        </div>
                    </div>

                    <div class="flex flex-col mb-6">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="text-[13px] font-bold text-zinc-300">工时消耗分布 (Top 5 项目)</h4>
                        </div>
                        <div class="space-y-4" id="project-dist-container">
                            <div class="text-center text-zinc-500 py-10 text-sm">暂无数据</div>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col border-t border-white/5 pt-6">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="text-[13px] font-bold text-zinc-300">AI 提效工具库偏好</h4>
                        </div>
                        <div class="space-y-4" id="ai-dist-container">
                            <div class="text-center text-zinc-500 py-6 text-sm">本期未使用 AI 辅助</div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-white/5 mt-4 shrink-0">
                        <button onclick="window.exportMyExcel()" class="w-full bg-[#1a1a24] hover:bg-[#252532] border border-white/10 text-white rounded-xl py-3 text-[13px] font-bold transition-all btn-press flex justify-center items-center gap-2">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            <span id="export-btn-text">导出本期绩效报表 (CSV)</span>
                        </button>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <div id="hover-detail-card" class="fixed z-[999999] pointer-events-none opacity-0 transition-opacity duration-200 hidden bg-[#121217]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-[0_20px_50px_-10px_rgba(0,0,0,0.8)] p-5 w-80 flex-col"></div>

    <div id="period-detail-modal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="window.closeModal('period-detail-modal')"></div>
        <div class="bg-[#121217] border border-white/10 w-full max-w-md rounded-3xl shadow-2xl relative flex flex-col z-10 transform transition-all duration-300 scale-95 opacity-0" id="period-detail-content">
            <div class="px-6 py-5 border-b border-white/5 flex justify-between items-center bg-[#09090b]/50 rounded-t-3xl">
                <h3 id="period-modal-title" class="text-white font-bold text-[16px]">交付清单</h3>
                <button onclick="window.closeModal('period-detail-modal')" class="text-zinc-500 hover:text-white transition-colors bg-white/5 hover:bg-white/10 p-1.5 rounded-full btn-press">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="period-modal-list" class="p-6 space-y-3 max-h-[60vh] overflow-y-auto custom-scrollbar"></div>
        </div>
    </div>

    <div id="pwd-modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[99999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center" onclick="if(event.target === this) window.closePwdModal()">
        <div id="pwd-modal" class="hidden w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative">
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-orange-500 to-amber-500 rounded-t-3xl"></div>
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-[16px] font-bold text-white flex items-center gap-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-orange-500"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg> 修改登录密码</h2>
                <button onclick="window.closePwdModal()" class="text-zinc-500 hover:text-white bg-zinc-800 hover:bg-zinc-700 rounded-full p-1 transition-colors btn-press"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="space-y-4">
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">当前密码</label><input type="password" id="old-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入原密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">新密码</label><input type="password" id="new-pwd" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="输入新密码"></div>
                <div><label class="block text-[12px] font-bold text-zinc-400 mb-1.5">确认新密码</label><input type="password" id="new-pwd-confirm" class="w-full bg-[#09090b] border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-orange-500 transition-colors" placeholder="再次输入新密码"></div>
            </div>
            <button onclick="window.submitPwdChange()" class="w-full mt-6 py-3.5 bg-orange-600 hover:bg-orange-500 text-white rounded-xl text-sm font-bold shadow-[0_5px_15px_rgba(249,115,22,0.3)] transition-all btn-press">确认修改并重新登录</button>
        </div>
    </div>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-orange-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-emerald-500/20 text-emerald-400">
