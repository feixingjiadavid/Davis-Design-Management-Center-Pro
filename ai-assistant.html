<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小戴维斯-AI - 戴维斯设计需求管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/global.css">
</head>
<body class="flex h-screen overflow-hidden relative selection:bg-indigo-500/30 text-zinc-300">

    <div class="absolute inset-0 bg-[#09090b] z-0 pointer-events-none"></div>
    <div class="absolute top-0 left-1/4 w-[800px] h-[600px] bg-indigo-900/5 rounded-full blur-[180px] pointer-events-none z-0"></div>

    <aside class="w-[240px] border-r border-white/5 flex flex-col z-10 bg-[#09090b] shrink-0 h-full">
        <div class="p-7 border-b border-white/5 shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.3)] shrink-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8.01" y2="16"></line><line x1="16" y1="16" x2="16.01" y2="16"></line></svg>
                </div>
                <h1 class="text-[15px] font-bold text-white tracking-wide">小戴维斯-AI</h1>
            </div>
        </div>

        <div class="p-4 border-b border-white/5 shrink-0 space-y-3">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-2.5 bg-white/5 hover:bg-white/10 rounded-xl text-zinc-400 hover:text-white transition-colors btn-press">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span class="text-[12px] font-bold">返回排号大厅</span>
            </button>
            <button onclick="window.startNewChat()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white font-bold transition-colors btn-press shadow-md">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span class="text-[13px]">开启新对话</span>
            </button>
        </div>

        <div class="px-5 pt-4 pb-2 text-[10px] font-bold text-zinc-500 uppercase tracking-wider shrink-0">历史会话</div>
        <div class="flex-1 overflow-y-auto px-3 pb-3 space-y-1 custom-scrollbar" id="chat-session-list">
        </div>

        <div class="px-5 py-6 mt-auto border-t border-white/5 bg-[#0c0c0e] shrink-0 flex items-center justify-between">
            <div class="flex items-center gap-3 min-w-0">
                <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg">?</div>
                <div class="min-w-0 flex-1">
                    <p id="sidebar-name" class="text-[13px] font-bold text-white mb-0.5 truncate">加载中...</p>
                    <p class="text-[10px] text-zinc-500 truncate">系统成员</p>
                </div>
            </div>
            <div class="flex items-center gap-1 shrink-0 ml-2">
                <button onclick="window.location.href='login.html'" class="p-1.5 text-zinc-500 hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-colors btn-press" title="退出系统">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative z-10 bg-[#0c0c0e]">
        
        <header class="px-10 py-6 border-b border-white/5 shrink-0 bg-[#09090b]/80 backdrop-blur-xl flex flex-col z-20">
            <div class="flex justify-between items-center w-full">
                <div>
                    <h2 class="text-[22px] font-bold text-white tracking-tight flex items-center gap-3">
                        智能助手小戴维斯
                        <span class="bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-[10px] px-2 py-0.5 rounded uppercase font-mono tracking-wider">Powered by Coze</span>
                    </h2>
                    <p class="text-[12px] text-zinc-500 mt-1">提单前，您可以先在此获取各项目的标准 Logo、字体包、常用宣发物料及历史规范链接。</p>
                </div>
                <button onclick="window.deleteCurrentSession()" class="text-zinc-500 hover:text-rose-400 text-[12px] flex items-center gap-1.5 transition-colors btn-press bg-white/5 px-3 py-1.5 rounded-lg border border-white/5 hover:border-rose-500/30">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 删除当前对话
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 w-full" id="chat-container">
            <div class="w-full max-w-[850px] mx-auto space-y-6 flex flex-col pb-32" id="chat-box">
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#09090b] via-[#09090b]/95 to-transparent pt-10 pb-8 px-10 flex justify-center z-20">
            <div class="w-full max-w-[850px] relative">
                <textarea id="chat-input" rows="1" class="w-full bg-[#121217] border border-zinc-700/80 focus:border-indigo-500 rounded-2xl pl-5 pr-14 py-4 text-[14px] text-white outline-none resize-none shadow-2xl transition-all custom-scrollbar max-h-[150px]" placeholder="描述你需要找的物料或规范，例如：请给我发一下今年年度大会的Logo矢量图链接..." oninput="window.autoResize(this)" onkeydown="window.handleEnter(event)"></textarea>
                <button onclick="window.sendUserMessage()" id="btn-send" class="absolute right-3 bottom-3 w-9 h-9 rounded-xl bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center text-white transition-all btn-press shadow-md" title="发送 (Enter)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <div id="custom-dialog-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[999999] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center">
        <div id="custom-dialog" class="w-full max-w-sm bg-[#121217] border border-white/10 rounded-3xl shadow-2xl flex flex-col scale-95 transition-transform duration-300 p-6 relative overflow-hidden">
            <div id="dialog-color-bar" class="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>
            <div class="flex items-center gap-3 mb-3 mt-2">
                <div id="dialog-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"></div>
                <h2 id="dialog-title" class="text-[16px] font-bold text-white">提示</h2>
            </div>
            <p id="dialog-message" class="text-[13px] text-zinc-400 leading-relaxed mb-6">内容</p>
            <div class="flex gap-3 justify-end w-full mt-auto" id="dialog-buttons"></div>
        </div>
    </div>

    <div id="action-toast" class="fixed top-8 right-8 z-[100000] hidden toast-slide-in">
        <div class="bg-[#1a1a1f] border border-white/10 p-4 rounded-2xl shadow-2xl flex items-center gap-3 w-72">
            <div id="toast-icon" class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 bg-emerald-500/20 text-emerald-400">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div><h4 id="toast-title" class="text-white text-sm font-bold">成功</h4><p id="toast-desc" class="text-[11px] text-zinc-400 mt-0.5">操作已执行。</p></div>
        </div>
    </div>

    <script src="./js/ai-assistant.js"></script>
</body>
</html>
